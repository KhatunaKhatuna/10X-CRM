<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clients - 10X CRM</title>

  <link rel="stylesheet" href="css/reset.css" />
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/toast.css" />
  <link rel="stylesheet" href="css/clients.css" />

  <script src="js/storage.js"></script>
  <script src="js/guard.js"></script>
  <script src="js/theme.js"></script>
</head>

<body class="app-body">
  <div class="app-layout">
    <!-- Sidebar Navigation -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar__header">
        <button id="sidebar-toggle" class="sidebar__toggle-btn">
          <!-- Icon for expanded state (click to close, arrow left) -->
          <svg class="sidebar__icon icon-close" viewBox="0 0 24 24" fill="currentColor"
            xmlns="http://www.w3.org/2000/svg">
            <rect x="2" y="4" width="12" height="2.5" rx="1.25" />
            <rect x="2" y="9" width="8" height="2.5" rx="1.25" />
            <rect x="2" y="14" width="8" height="2.5" rx="1.25" />
            <rect x="2" y="19" width="12" height="2.5" rx="1.25" />
            <path d="M19 9l-6 3.75 6 3.75V9z" />
          </svg>
          <!-- Icon for collapsed state (click to open, arrow right) -->
          <svg class="sidebar__icon icon-open" viewBox="0 0 24 24" fill="currentColor"
            xmlns="http://www.w3.org/2000/svg" style="display: none;">
            <rect x="2" y="4" width="12" height="2.5" rx="1.25" />
            <rect x="2" y="9" width="8" height="2.5" rx="1.25" />
            <rect x="2" y="14" width="8" height="2.5" rx="1.25" />
            <rect x="2" y="19" width="12" height="2.5" rx="1.25" />
            <path d="M13 9l6 3.75-6 3.75V9z" />
          </svg>
        </button>
      </div>
      <nav class="sidebar__nav">
        <a href="dashboard.html" class="sidebar__link">
          <svg class="sidebar__icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
            stroke-width="1.5" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M3.75 6A2.25 2.25 0 0 1 6 3.75h2.25A2.25 2.25 0 0 1 10.5 6v2.25a2.25 2.25 0 0 1-2.25 2.25H6a2.25 2.25 0 0 1-2.25-2.25V6ZM3.75 15.75A2.25 2.25 0 0 1 6 13.5h2.25a2.25 2.25 0 0 1 2.25 2.25V18a2.25 2.25 0 0 1-2.25 2.25H6A2.25 2.25 0 0 1 3.75 18v-2.25ZM13.5 6a2.25 2.25 0 0 1 2.25-2.25H18A2.25 2.25 0 0 1 20.25 6v2.25A2.25 2.25 0 0 1 18 10.5h-2.25a2.25 2.25 0 0 1-2.25-2.25V6ZM13.5 15.75a2.25 2.25 0 0 1 2.25-2.25H18a2.25 2.25 0 0 1 2.25 2.25V18A2.25 2.25 0 0 1 18 20.25h-2.25A2.25 2.25 0 0 1 13.5 18v-2.25Z" />
          </svg>
          <span class="sidebar__link-text">Dashboard</span>
        </a>
        <a href="clients.html" class="sidebar__link sidebar__link--active">
          <svg class="sidebar__icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
            stroke-width="1.5" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M15 19.128a9.38 9.38 0 0 0 2.625.372 9.337 9.337 0 0 0 4.121-.952 4.125 4.125 0 0 0-7.533-2.493M15 19.128v-.003c0-1.113-.285-2.16-.786-3.07M15 19.128v.106A12.318 12.318 0 0 1 8.624 21c-2.331 0-4.512-.645-6.374-1.766l-.001-.109a6.375 6.375 0 0 1 11.964-3.07M12 6.375a3.375 3.375 0 1 1-6.75 0 3.375 3.375 0 0 1 6.75 0Zm8.25 2.25a2.625 2.625 0 1 1-5.25 0 2.625 2.625 0 0 1 5.25 0Z" />
          </svg>
          <span class="sidebar__link-text">Clients</span>
        </a>
        <a href="profile.html" class="sidebar__link">
          <svg class="sidebar__icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
            stroke-width="1.5" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M17.982 18.725A7.488 7.488 0 0 0 12 15.75a7.488 7.488 0 0 0-5.982 2.975m11.963 0a9 9 0 1 0-11.963 0m11.963 0A8.966 8.966 0 0 1 12 21a8.966 8.966 0 0 1-5.982-2.275M15 9.75a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
          </svg>
          <span class="sidebar__link-text">Profile</span>
        </a>
      </nav>

      <!-- Sidebar Footer (Theme) -->
      <div class="sidebar__footer">
        <button id="theme-toggle" class="sidebar__action-btn">
          <svg class="sidebar__icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
            stroke-width="1.5" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M12 3v2.25m6.364.386-1.591 1.591M21 12h-2.25m-.386 6.364-1.591-1.591M12 18.75V21m-4.773-4.227-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0Z" />
          </svg>
          <span class="sidebar__link-text" id="theme-text">Theme</span>
        </button>
      </div>
    </aside>

    <!-- Main Content Area -->
    <div class="main-wrapper">

      <!-- Topbar Header -->
      <header class="topbar">
        <div class="topbar__logo">
          <a href="dashboard.html" class="topbar__logo-link">
            <svg width="100%" height="100%" viewBox="0 0 129 78" fill="none" xmlns="http://www.w3.org/2000/svg">
              <defs>
                <linearGradient id="blueGrad_inspector" x1="10" y1="190" x2="190" y2="10"
                  gradientUnits="userSpaceOnUse">
                  <stop offset="0%" stop-color="#1d4ed8" />
                  <stop offset="50%" stop-color="#2563eb" />
                  <stop offset="100%" stop-color="#0284c7" />
                </linearGradient>
                <filter id="glowFilter_inspector" x="-30%" y="-30%" width="160%" height="160%">
                  <feGaussianBlur stdDeviation="1" result="blur" />
                  <feComposite in="SourceGraphic" in2="blur" operator="over" />
                </filter>
              </defs>

              <g transform="translate(-61, -61)">
                <!-- ICON VARIATION 1: CLASSIC 10X EMBLEM -->
                <g transform="scale(0.3)" style="transform-origin: 100px 100px;">
                  <polygon points="100,12 188,100 100,188 12,100" fill="none" stroke="#2563eb" stroke-width="1.5"
                    stroke-dasharray="4 4" stroke-opacity="0.35" />
                  <path d="M 32 145 L 32 60 L 22 72 L 22 55 L 38 38 L 52 38 L 52 145 Z" fill="url(#blueGrad_inspector)"
                    filter="url(#glowFilter_inspector)" />
                  <polygon points="95,42 120,42 135,70 135,115 120,142 95,142 80,115 80,70" fill="none"
                    stroke="url(#blueGrad_inspector)" stroke-width="12" stroke-linejoin="miter"
                    filter="url(#glowFilter_inspector)" />
                  <path d="M 132 145 L 175 62 L 165 62 L 188 32 L 188 65 L 178 55 L 142 145 Z"
                    fill="url(#blueGrad_inspector)" />
                  <polygon points="142,42 156,42 188,125 174,125" fill="#2563eb" opacity="0.9" />

                </g>
              </g>

              <!-- TYPOGRAPHY -->
              <g transform="translate(66, 47.64)">
                <text x="0" y="0" fill="url(#blueGrad_inspector)" filter="url(#glowFilter_inspector)"
                  font-family='"Arial Black", Gadget, sans-serif' font-weight="900" font-size="24px"
                  letter-spacing="0.08em" text-anchor="start" style="text-transform: uppercase;">CRM</text>

              </g>

            </svg>
          </a>
        </div>

        <div class="topbar__right">
          <div class="profile-menu">
            <button class="profile-menu__trigger" id="profile-trigger">
              <div class="profile-menu__avatar" id="profile-avatar">U</div>
              <span class="profile-menu__greeting" id="welcome-text">Welcome back, User</span>
              <svg class="profile-menu__arrow" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20"
                fill="currentColor">
                <path fill-rule="evenodd"
                  d="M5.22 8.22a.75.75 0 0 1 1.06 0L10 11.94l3.72-3.72a.75.75 0 1 1 1.06 1.06l-4.25 4.25a.75.75 0 0 1-1.06 0L5.22 9.28a.75.75 0 0 1 0-1.06Z"
                  clip-rule="evenodd" />
              </svg>
            </button>

            <div class="profile-menu__dropdown" id="profile-dropdown">
              <a href="profile.html" class="profile-menu__item">
                <svg class="profile-menu__icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                  stroke-width="1.5" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round"
                    d="M17.982 18.725A7.488 7.488 0 0 0 12 15.75a7.488 7.488 0 0 0-5.982 2.975m11.963 0a9 9 0 1 0-11.963 0m11.963 0A8.966 8.966 0 0 1 12 21a8.966 8.966 0 0 1-5.982-2.275M15 9.75a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
                </svg>
                Profile
              </a>
              <button id="logout-btn" class="profile-menu__item profile-menu__item--danger">
                <svg class="profile-menu__icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                  stroke-width="1.5" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round"
                    d="M8.25 9V5.25A2.25 2.25 0 0 1 10.5 3h6a2.25 2.25 0 0 1 2.25 2.25v13.5A2.25 2.25 0 0 1 16.5 21h-6a2.25 2.25 0 0 1-2.25-2.25V15M12 9l3 3m0 0-3 3m3-3H2.25" />
                </svg>
                Log Out
              </button>
            </div>
          </div>
        </div>
      </header>

      <!-- Page Content -->
      <main class="page-content">
        <div class="dashboard-header"
          style="display: flex; align-items: center; justify-content: space-between; gap: 1.6rem;">
          <h1 class="dashboard-header__title">Clients</h1>
          <button id="btn-add-client" class="btn-add-client">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2"
              stroke="currentColor"
              style="width: 1.8rem; height: 1.8rem; margin-right: 0.5rem; display: inline-block; vertical-align: middle;">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
            </svg>
            Add Client
          </button>
        </div>

        <!-- Toolbar -->
        <div class="toolbar">
          <div class="toolbar__search">
            <svg class="toolbar__search-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z" />
            </svg>
            <input type="text" id="search-input" placeholder="Search clients..." class="toolbar__input" />
          </div>

          <div class="toolbar__filters" id="status-filters">
            <button class="filter-chip filter-chip--active" data-status="All">All</button>
            <button class="filter-chip" data-status="Lead">Lead</button>
            <button class="filter-chip" data-status="Contacted">Contacted</button>
            <button class="filter-chip" data-status="Won">Won</button>
            <button class="filter-chip" data-status="Lost">Lost</button>
          </div>

          <div class="toolbar__sort">
            <div class="toolbar__select-wrapper">
              <select id="sort-select" class="toolbar__select">
                <option value="newest">Newest First</option>
                <option value="deal-desc">Deal: High-Low</option>
                <option value="deal-asc">Deal: Low-High</option>
                <option value="name-asc">Name: A-Z</option>
                <option value="name-desc">Name: Z-A</option>
              </select>
              <svg class="toolbar__select-arrow" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="m19.5 8.25-7.5 7.5-7.5-7.5" />
              </svg>
            </div>
          </div>
        </div>

        <!-- Container for Client Cards -->
        <div id="clients-grid" class="clients-grid"></div>
      </main>

      <!-- Add Client Modal -->
      <div id="add-client-modal" class="modal">
        <form id="add-client-form" class="modal__content" novalidate>
          <div class="modal__header">
            <h2 class="modal__title">Add New Client</h2>
            <button type="button" id="btn-close-modal" class="modal__close-btn" title="Close modal">
              <svg fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
              </svg>
            </button>
          </div>
          <div class="modal__body">
            <div class="form-group">
              <label for="client-name" class="form-label">Full Name *</label>
              <div class="form-group__input-wrapper">
                <svg class="form-group__icon" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round"
                    d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z" />
                </svg>
                <input type="text" id="client-name" name="name" class="form-group__input" placeholder="Emily Johnson">
              </div>
              <span class="form-group__error-message" id="client-name-error"></span>
            </div>
            <div class="form-group">
              <label for="client-company" class="form-label">Company</label>
              <div class="form-group__input-wrapper">
                <svg class="form-group__icon" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round"
                    d="M3.75 21h16.5M4.5 3h15M5.25 3v18m13.5-18v18M9 6.75h1.5m-1.5 3h1.5m-1.5 3h1.5m3-6H15m-1.5 3H15m-1.5 3H15M9 21v-3.375c0-.621.504-1.125 1.125-1.125h3.75c.621 0 1.125.504 1.125 1.125V21" />
                </svg>
                <input type="text" id="client-company" name="company" class="form-group__input" placeholder="Acme Corp">
              </div>
              <span class="form-group__error-message" id="client-company-error"></span>
            </div>
            <div class="form-group">
              <label for="client-email" class="form-label">Email Address *</label>
              <div class="form-group__input-wrapper">
                <svg class="form-group__icon" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round"
                    d="M21.75 6.75v10.5a2.25 2.25 0 0 1-2.25 2.25h-15a2.25 2.25 0 0 1-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0 0 19.5 4.5h-15a2.25 2.25 0 0 0-2.25 2.25m19.5 0v.243a2.25 2.25 0 0 1-1.07 1.916l-7.5 4.615a2.25 2.25 0 0 1-2.36 0L3.32 8.91a2.25 2.25 0 0 1-1.07-1.916V6.75" />
                </svg>
                <input type="text" id="client-email" name="email" class="form-group__input"
                  placeholder="emily@example.com">
              </div>
              <span class="form-group__error-message" id="client-email-error"></span>
            </div>
            <div class="form-group">
              <label for="client-phone" class="form-label">Phone Number</label>
              <div class="form-group__input-wrapper">
                <svg class="form-group__icon" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round"
                    d="M2.25 6.75c0 8.284 6.716 15 15 15h2.25a2.25 2.25 0 0 0 2.25-2.25v-1.372c0-.516-.351-.966-.852-1.091l-4.423-1.106c-.44-.11-.902.055-1.173.417l-.97 1.293c-2.896-1.596-5.48-4.18-7.076-7.076l1.293-.97c.362-.271.527-.734.417-1.173L6.963 3.102a1.125 1.125 0 0 0-1.091-.852H4.5A2.25 2.25 0 0 0 2.25 4.5v2.25Z" />
                </svg>
                <input type="tel" id="client-phone" name="phone" class="form-group__input"
                  placeholder="+1 555 123 4567">
              </div>
              <span class="form-group__error-message" id="client-phone-error"></span>
            </div>
            <div class="form-group">
              <label for="client-deal-value" class="form-label">Deal Value *</label>
              <div class="form-group__input-wrapper">
                <svg class="form-group__icon" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round"
                    d="M12 6v12m-3-2.818l.879.659c1.171.879 3.07.879 4.242 0 1.172-.879 1.172-2.303 0-3.182C13.536 12.219 12.768 12 12 12c-.725 0-1.45-.22-2.003-.659-1.106-.879-1.106-2.303 0-3.182s2.9-.879 4.006 0l.415.33M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
                <input type="number" id="client-deal-value" name="dealValue" class="form-group__input"
                  placeholder="5000">
              </div>
              <span class="form-group__error-message" id="client-deal-value-error"></span>
            </div>
            <div class="form-group">
              <label for="client-status" class="form-label">Status</label>
              <div class="form-group__input-wrapper">
                <svg class="form-group__icon" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round"
                    d="M9.568 3H5.25A2.25 2.25 0 003 5.25v4.318c0 .597.237 1.17.659 1.591l9.581 9.581c.699.699 1.78.872 2.607.33a18.095 18.095 0 005.223-5.223c.542-.827.369-1.908-.33-2.607L11.16 3.66A2.25 2.25 0 009.568 3z" />
                  <path stroke-linecap="round" stroke-linejoin="round" d="M6 6h.008v.008H6V6z" />
                </svg>
                <select id="client-status" name="status" class="form-group__input form-group__input--select">
                  <option value="Lead">Lead</option>
                  <option value="Contacted">Contacted</option>
                  <option value="Won">Won</option>
                  <option value="Lost">Lost</option>
                </select>
                <svg class="form-group__select-arrow" fill="none" viewBox="0 0 24 24" stroke-width="2"
                  stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5" />
                </svg>
              </div>
              <span class="form-group__error-message" id="client-status-error"></span>
            </div>
          </div>
          <div class="modal__footer">
            <button type="button" id="btn-cancel-modal" class="btn btn--secondary">Cancel</button>
            <button type="submit" id="btn-save-client" class="btn btn--primary">Save Client</button>
          </div>
        </form>
      </div>

      <!-- Client Details Modal -->
      <div id="client-details-modal" class="modal modal--active">
        <div class="modal__content modal__content--large">
          <div class="modal__header">
            <h2 class="modal__title">Client Details</h2>
            <div class="modal__header-actions" style="display: flex; gap: 0.8rem; align-items: center;">
              <button type="button" id="btn-edit-client" class="modal__close-btn" title="Edit client">
                <svg fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round"
                    d="m16.862 4.487 1.687-1.688a1.875 1.875 0 1 1 2.652 2.652L6.832 19.82a4.5 4.5 0 0 1-1.897 1.13l-2.685.8.8-2.685a4.5 4.5 0 0 1 1.13-1.897L16.863 4.487Zm0 0L19.5 7.125" />
                </svg>
              </button>
              <button type="button" id="btn-close-details-modal" class="modal__close-btn" title="Close modal">
                <svg fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                </svg>
              </button>
            </div>
          </div>
          <div class="modal__body details-modal-body">
            <!-- Left Column: Details -->
            <div class="details-section">
              <div class="details-profile">
                <img id="details-avatar" class="details-avatar" src="" alt="Avatar">
                <div class="details-profile-info">
                  <h3 id="details-name" class="details-name">Client Name</h3>
                  <span id="details-date" class="details-date">Client since...</span>
                </div>
              </div>

              <div class="details-grid">
                <div class="detail-item">
                  <span class="detail-label">Company</span>
                  <span id="details-company" class="detail-value">-</span>
                </div>
                <div class="detail-item">
                  <span class="detail-label">Email</span>
                  <span id="details-email" class="detail-value">-</span>
                </div>
                <div class="detail-item">
                  <span class="detail-label">Phone</span>
                  <span id="details-phone" class="detail-value">-</span>
                </div>
                <div class="detail-item">
                  <span class="detail-label">Deal Value</span>
                  <span id="details-deal" class="detail-value">-</span>
                </div>
                <div class="detail-item">
                  <span class="detail-label">Status</span>
                  <span id="details-status" class="detail-value"></span>
                </div>
              </div>

              <div class="details-actions">
                <button type="button" id="btn-remind" class="btn-remind">
                  <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"
                    style="width: 1.8rem; height: 1.8rem;">
                    <path stroke-linecap="round" stroke-linejoin="round"
                      d="M12 6v6h4.5m4.5 0a9 9 0 11-18 0 9 9 0 0118 0z" />
                  </svg>
                  Remind me in 1 min
                </button>
              </div>
            </div>

            <!-- Right Column: Notes -->
            <div class="notes-section">
              <h3 class="notes-title">Notes</h3>
              <div id="notes-list" class="notes-list">
                <!-- Notes will be injected here -->
              </div>
              <form id="add-note-form" class="add-note-form">
                <textarea id="note-input" class="form-group__input add-note-input" placeholder="Type a new note here..."
                  rows="3"></textarea>
                <button type="submit" class="btn-add-note">
                  <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"
